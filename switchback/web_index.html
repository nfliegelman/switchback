<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Switchback</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --ink:#1e2a23; --pine:#2f6f4f; --sand:#f4f1ea; --line:#d8d2c4; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 system-ui, sans-serif; color:var(--ink); background:var(--sand); }
  header { display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:10px 14px; background:#fff; border-bottom:1px solid var(--line); }
  header b { font-size:16px; margin-right:6px; }
  header .tag { color:#7a746a; font-size:12px; margin-right:auto; }
  select, input, button { font:inherit; padding:6px 8px; border:1px solid var(--line); border-radius:8px; background:#fff; }
  input[type=date] { width:138px; } input.small { width:64px; } input.codes { width:150px; }
  button { cursor:pointer; }
  button.primary { background:var(--pine); color:#fff; border-color:var(--pine); }
  button.ghost { background:#fff; color:var(--pine); border-color:var(--pine); }
  #wrap { display:flex; height:calc(100vh - 58px); }
  #side { width:400px; max-width:46vw; overflow-y:auto; padding:12px; background:#fff; border-right:1px solid var(--line); }
  #map { flex:1; }
  .route { border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px; cursor:pointer; }
  .route:hover { border-color:var(--pine); }
  .route.active { border-color:var(--pine); box-shadow:0 0 0 2px #2f6f4f33; }
  .route .score { float:right; font-weight:700; color:var(--pine); }
  .route .shape { display:inline-block; font-size:11px; background:var(--sand); border-radius:6px; padding:1px 6px; margin-left:4px; }
  .route .days, .route .dates, .route .note { color:#5c564c; font-size:12px; margin-top:3px; }
  .day-btn { cursor:pointer; text-decoration:underline dotted; }
  .day-btn:hover { color:var(--pine); }
  #profile { border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin-bottom:10px; background:#fff; }
  #profile .hd { display:flex; justify-content:space-between; align-items:center; font-size:12px; color:#5c564c; margin-bottom:4px; }
  #profile .close { cursor:pointer; color:var(--pine); }
  #profile svg { display:block; width:100%; height:90px; }
  .warn { background:#fff6e5; border:1px solid #eedaa8; border-radius:8px; padding:8px 10px; font-size:12px; margin-bottom:10px; }
  .muted { color:#7a746a; font-size:12px; }
  .opt { display:flex; justify-content:space-between; gap:8px; border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin-bottom:8px; cursor:pointer; }
  .opt:hover { border-color:var(--pine); }
  .opt .meta { color:#5c564c; font-size:12px; }
  .opt .endings { font-weight:700; color:var(--pine); white-space:nowrap; }
  .chips { margin:8px 0; } .chip { display:inline-block; background:var(--sand); border:1px solid var(--line); border-radius:14px; padding:2px 10px; margin:2px; font-size:12px; }
  h3 { margin:6px 0 10px; font-size:15px; }
  .pform label { display:block; font-size:12px; color:#5c564c; margin:8px 0 2px; }
  .pform .sec { border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin-bottom:8px; background:#fff; }
  .pform .sec b { font-size:12px; letter-spacing:.4px; color:var(--pine); }
  .pform input.small { width:70px; }
  .pform .preset { font-size:12px; padding:4px 8px; margin:2px 2px 2px 0; }
  .pform .preset.on { background:var(--pine); color:#fff; border-color:var(--pine); }
  .pform .summary { font-size:12px; color:#5c564c; background:var(--sand); border-radius:8px; padding:8px 10px; margin:8px 0; }
  .card { border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:10px; cursor:pointer; background:#fff; }
  .card:hover, .card.active { border-color:var(--pine); box-shadow:0 0 0 2px #2f6f4f22; }
  .badge { display:inline-block; font-size:10px; letter-spacing:.4px; text-transform:uppercase; border-radius:6px; padding:2px 6px; margin-right:4px; }
  .badge.fit { background:#e4efe8; color:#2f6f4f; }
  .badge.stretch { background:#fff0d6; color:#8a5a2b; }
  .badge.avail { background:#e7ecf5; color:#33507a; }
  .badge.top { background:var(--pine); color:#fff; }
  .card .ttl { font-weight:700; margin:4px 0 2px; }
  .card .meta, .nightrow .meta { color:#5c564c; font-size:12px; }
  .card .why { font-size:12px; margin-top:4px; }
  .card .trade { font-size:12px; color:#8a5a2b; margin-top:2px; }
  .nightrow { border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin-bottom:6px; background:#fff; }
  .nightrow b { font-size:13px; }
  .nightrow a { color:var(--pine); }
  .fresh { font-size:11px; color:#7a746a; margin:6px 0; }
  .relax { background:#eef4f0; border:1px solid #cfe0d5; border-radius:8px; padding:8px 10px; font-size:12px; margin-bottom:8px; }
  .legend { font-size:11px; color:#5c564c; margin-top:6px; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin:0 3px 0 8px; vertical-align:middle; }
</style>
</head>
<body>
<header>
  <b>Switchback</b><span class="tag">the map</span>
  <select id="park"></select>
  <select id="area"></select>
  <input type="date" id="start"><input type="date" id="end">
  <input class="small" id="nights" type="number" min="1" max="8" value="3" title="nights">
  <input class="small" id="party" type="number" min="1" max="12" value="2" title="party">
  <span id="advctl" style="display:none">
  <select id="ttype"><option value="any">any shape</option><option value="loop">loop</option><option value="out and back">out and back</option><option value="basecamp">basecamp</option></select>
  <input class="codes" id="codes" placeholder="codes (optional)">
  <input class="codes" id="via" placeholder="via camp (optional)">
  </span>
  <button class="primary" id="plan">Plan trips</button>
  <button class="ghost" id="find">Classic list</button>
  <button class="ghost" id="adv">Adventure</button>
</header>
<div id="wrap">
  <div id="side">
    <div class="muted">Pick a park. Camps color by open nights in your window
      <span class="dot" style="background:#2f6f4f"></span>open
      <span class="dot" style="background:#e0a13d"></span>some
      <span class="dot" style="background:#b8433a"></span>full
      <span class="dot" style="background:#9aa"></span>unknown</div>
    <div id="planform" style="display:none;margin-top:12px"></div>
    <div id="profile" style="display:none;margin-top:12px"></div>
    <div id="results" style="margin-top:12px"></div>
  </div>
  <div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const $ = id => document.getElementById(id);
const map = L.map('map', { zoomSnap: 0.5 }).setView([47.5, -113.7], 6);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 17, attribution: '&copy; OpenStreetMap contributors; trails: OSM (ODbL) + USGS/USFS &middot; <a href="#" onclick="sbQuit();return false">quit</a>' }).addTo(map);
function sbQuit(){ fetch('/api/quit',{method:'POST'}).then(() => {
  document.body.innerHTML = '<p style="padding:2em">Switchback is shut down. Close this tab. Double-click Switchback.bat to start again.</p>'; }); }

let PARK = null, NODES = {}, markers = {}, edgeLayer = null, routeLayer = null;
let mode = 'trips', advSeq = [], advEntrance = null;

function iso(d){ return d.toISOString().slice(0,10); }
(function initDates(){
  const s = new Date(); s.setDate(s.getDate()+14);
  const e = new Date(); e.setDate(e.getDate()+28);
  $('start').value = iso(s); $('end').value = iso(e);
})();

async function jget(u){ const r = await fetch(u); if(!r.ok) throw new Error(await r.text()); return r.json(); }
async function jpost(u,b){ const r = await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
  if(!r.ok){ const t = await r.text(); throw new Error(t); } return r.json(); }

async function loadParks(){
  const parks = await jget('/api/parks');
  $('park').innerHTML = parks.map(p=>`<option value="${p.slug}">${p.name}</option>`).join('');
  await loadPark($('park').value);
}
$('park').onchange = e => loadPark(e.target.value);

async function loadPark(slug){
  PARK = await jget('/api/park/'+slug);
  NODES = {}; PARK.nodes.forEach(n => NODES[n.id] = n);
  Object.values(markers).forEach(m => map.removeLayer(m)); markers = {};
  if (edgeLayer) map.removeLayer(edgeLayer);
  if (routeLayer) map.removeLayer(routeLayer);
  const segs = PARK.edges
    .filter(e => e.path || (NODES[e.a].lat && NODES[e.b].lat))
    .map(e => e.path ? e.path : [[NODES[e.a].lat, NODES[e.a].lon],[NODES[e.b].lat, NODES[e.b].lon]]);
  edgeLayer = L.polyline(segs, {color:'#8a8375', weight:1.5, opacity:.6, dashArray:'4 5'}).addTo(map);
  const pts = [];
  PARK.nodes.forEach(n => {
    if (n.lat == null) return;
    pts.push([n.lat, n.lon]);
    const ent = n.kind === 'entrance';
    const m = ent
      ? L.marker([n.lat,n.lon], {icon: L.divIcon({html:'&#9650;', className:'', iconSize:[16,16]})})
      : L.circleMarker([n.lat,n.lon], {radius:6, color:'#555', weight:1, fillColor:'#9aa', fillOpacity:.9});
    m.bindTooltip(n.name + (n.lake ? ' (lake)' : '') + (n.policy && n.policy !== 'reservation' ? ' [first-come, no permit system]' : ''));
    m.on('click', () => nodeClick(n));
    m.addTo(map); markers[n.id] = m;
  });
  if (pts.length) map.fitBounds(pts, {padding:[30,30]});
  refreshAvailability();
  resetAdventure(false);
}

async function refreshAvailability(){
  try {
    const q = `start=${$('start').value}&end=${$('end').value}&party=${$('party').value}`;
    const av = await jget(`/api/availability/${PARK.slug}?`+q);
    const days = Math.max(1, (new Date($('end').value) - new Date($('start').value))/86400000 + 1);
    av.camps.forEach(c => {
      const m = markers[c.id]; if (!m || !m.setStyle) return;
      const share = c.open_nights / days;
      m.setStyle({fillColor: c.open_nights === 0 ? '#b8433a' : share > .6 ? '#2f6f4f' : '#e0a13d'});
      m.bindTooltip(`${NODES[c.id].name}${NODES[c.id].lake?' (lake)':''}: ${NODES[c.id].policy!=='reservation' ? 'first-come, always shown open' : c.open_nights + ' open night(s)'}`);
    });
  } catch(e){ console.log('availability', e); }
}
['start','end','party'].forEach(id => $(id).onchange = () => PARK && refreshAvailability());

$('find').onclick = async () => {
  mode = 'trips'; resetAdventure(false);
  $('planform').style.display = 'none';
  $('advctl').style.display = '';   // classic mode is the expert surface
  $('results').innerHTML = '<div class="muted">Fetching availability and solving...</div>';
  try {
    const body = { slug: PARK.slug, start: $('start').value, end: $('end').value,
      nights: +$('nights').value, party: +$('party').value,
      trip_type: $('ttype').value, codes: $('codes').value || null, via: $('via').value || null };
    const res = await jpost('/api/trips', body);
    let html = '';
    if (res.trip_type !== 'any')
      html += `<div class="warn">FILTER ACTIVE: only ${res.trip_type} trips shown. Other shapes were discarded before ranking.</div>`;
    html += `<div class="muted">${res.itineraries} bookable itineraries, ${res.routes_total} distinct routes, party ${res.party}.</div>`;
    res.routes.forEach((r,i) => {
      const days = r.days.map((d,k)=>`<span class="day-btn" data-i="${i}" data-k="${k}" title="climb and mileage for this day">${d[0].toFixed(1)}mi/${Math.round(d[1])}ft</span>`).join(' ');
      const stops = r.stops.map(s=>s.name.split(' - ')[0] + (s.policy && s.policy !== 'reservation' ? '*' : '')).join(' > ');
      html += `<div class="route" data-i="${i}"><span class="score">${r.score.toFixed(3)}</span>
        <b>${r.entrance.name.split(' - ')[0]}</b> <span class="shape">${r.type}</span>
        <div>${stops}</div><div class="days">${days}</div>
        <div class="dates">${r.dates.length} start date(s): ${r.dates[0]}${r.dates.length>1 ? ' to '+r.dates[r.dates.length-1] : ''}</div>
        ${(r.notes||[]).map(n=>`<div class="note">${n}</div>`).join('')}${r.stops.some(s=>s.policy && s.policy!=='reservation') ? '<div class="note">* first-come site: no reservation system, arrive early</div>' : ''}</div>`;
    });
    $('results').innerHTML = html || '<div class="muted">No bookable routes in that window.</div>';
    window._routes = res.routes;
    document.querySelectorAll('.route').forEach(el => el.onclick = (e) => { if (!e.target.classList.contains('day-btn')) drawRoute(+el.dataset.i, el); });
    document.querySelectorAll('.day-btn').forEach(el => el.onclick = (e) => { e.stopPropagation(); showProfile(+el.dataset.i, +el.dataset.k); });
    if (res.routes.length) drawRoute(0, document.querySelector('.route'));
  } catch(e){ $('results').innerHTML = `<div class="warn">${e.message}</div>`; }
};

async function showProfile(i, k){
  const r = window._routes[i];
  const hops = [r.entrance.id, ...r.stops.map(s=>s.id), r.entrance.id];
  const a = hops[k], b = hops[k+1];
  const p = $('profile');
  p.style.display = 'block';
  p.innerHTML = '<div class="muted">Loading elevation profile...</div>';
  try {
    const prof = await jpost('/api/profile', { slug: PARK.slug, a, b });
    const w = 340, h = 90, pad = 4;
    const mi = prof.mi, el = prof.elev_ft;
    const eMin = Math.min(...el), eMax = Math.max(...el) || eMin + 1;
    const miMax = mi[mi.length - 1] || 1;
    const x = m => pad + (w - 2*pad) * (m / miMax);
    const y = e => h - pad - (h - 2*pad) * ((e - eMin) / (eMax - eMin || 1));
    const pts = mi.map((m,j) => `${x(m).toFixed(1)},${y(el[j]).toFixed(1)}`).join(' ');
    const markX = x(prof.at_mi);
    p.innerHTML = `<div class="hd"><span>Day ${k+1}: toughest mile ${prof.toughest_ft} ft at mile ${prof.at_mi}, ${prof.shape}</span><span class="close" onclick="$('profile').style.display='none'">close</span></div>
      <svg viewBox="0 0 ${w} ${h}">
        <polyline points="${pts}" fill="none" stroke="#2f6f4f" stroke-width="2"/>
        <line x1="${markX}" y1="0" x2="${markX}" y2="${h}" stroke="#e0a13d" stroke-width="1" stroke-dasharray="3 2"/>
      </svg>
      <div class="muted">${eMin.toFixed(0)} to ${eMax.toFixed(0)} ft over ${miMax.toFixed(1)} mi</div>
      ${prof.est_hours ? `<div class="muted">About ${fmtH(prof.est_hours)} at a typical pace; steepest section ${prof.steepest_pct}%${prof.steep_miles_30plus ? `, with ${prof.steep_miles_30plus} mi at 30%+ grade` : ''}</div>` : ''}`;
  } catch(e){ p.innerHTML = `<div class="warn">Profile unavailable: ${e.message}</div>`; }
}

function drawRoute(i, el){
  document.querySelectorAll('.route').forEach(x=>x.classList.remove('active'));
  if (el) el.classList.add('active');
  const r = window._routes[i];
  if (routeLayer) map.removeLayer(routeLayer);
  const lines = r.day_paths.filter(p=>p.length>1 && p[0][0]!=null);
  routeLayer = L.layerGroup(lines.map(p => L.polyline(p, {color:'#2f6f4f', weight:4, opacity:.9}))).addTo(map);
  const all = lines.flat(); if (all.length) map.fitBounds(all, {padding:[40,40]});
}

$('adv').onclick = () => {
  mode = 'adventure'; advSeq = []; advEntrance = null;
  $('planform').style.display = 'none';
  if (routeLayer) map.removeLayer(routeLayer);
  $('results').innerHTML = `<h3>Adventure mode</h3>
    <div class="muted">Tap a triangle (a trailhead) on the map to start. Then choose each night from the live frontier: camps you can reach that day with an open site, ranked by how many ways the trip can still finish.</div>`;
};

function resetAdventure(msg){ if (mode==='adventure' && msg) $('adv').click(); }

async function nodeClick(n){
  if (mode !== 'adventure') return;
  if (!advEntrance){
    if (n.kind !== 'entrance'){ $('results').innerHTML += '<div class="warn">Start at a trailhead (triangle).</div>'; return; }
    advEntrance = n.id;
  }
  await stepFrontier();
}

async function stepFrontier(){
  $('results').innerHTML = '<div class="muted">Checking the frontier...</div>';
  try {
    const body = { slug: PARK.slug, entrance: advEntrance, start: $('start').value,
      seq: advSeq, nights: +$('nights').value, party: +$('party').value };
    const f = await jpost('/api/frontier', body);
    let html = `<h3>Adventure: night ${f.night+1} of ${f.nights}</h3>
      <div class="chips"><span class="chip">${NODES[advEntrance].name.split(' - ')[0]} (start)</span>` +
      advSeq.map(s=>`<span class="chip">${NODES[s].name.split(' - ')[0]}</span>`).join('') + `</div>`;
    if (f.finish){
      html += f.finish.ok
        ? `<div class="route"><b>Walk out to ${f.finish.entrance.split(' - ')[0]}</b><div class="days">${f.finish.mi} mi, +${f.finish.gain} ft. Trip complete.</div></div>`
        : `<div class="warn">The walk out exceeds your daily limits from here.</div>`;
    } else {
      if (!f.options.length) html += '<div class="warn">No reachable open camps that night. Step back.</div>';
      f.options.forEach(o => {
        html += `<div class="opt" data-id="${o.id}"><div><b>${o.name.split(' - ')[0]}</b>${o.lake?' &#128166;':''}
          <div class="meta">${o.mi} mi, +${o.gain} ft, ${o.policy && o.policy !== 'reservation' ? 'first-come, no reservation system' : (o.remaining ?? '?') + ' site(s) left'} ${f.date}</div></div>
          <div class="endings">${o.endings} finishes</div></div>`;
      });
    }
    html += `<button class="ghost" id="back">Step back</button>`;
    $('results').innerHTML = html;
    document.querySelectorAll('.opt').forEach(el => el.onclick = async () => { advSeq.push(el.dataset.id); await stepFrontier(); drawAdv(); });
    $('back').onclick = async () => { if (advSeq.length) advSeq.pop(); else advEntrance = null; if (advEntrance) { await stepFrontier(); drawAdv(); } else $('adv').click(); };
    drawAdv();
  } catch(e){ $('results').innerHTML = `<div class="warn">${e.message}</div>`; }
}

function drawAdv(){
  if (routeLayer) map.removeLayer(routeLayer);
  const stops = [advEntrance, ...advSeq].filter(Boolean).map(id => NODES[id]).filter(n => n && n.lat != null);
  if (stops.length < 2) { routeLayer = null; return; }
  routeLayer = L.polyline(stops.map(n=>[n.lat,n.lon]), {color:'#2f6f4f', weight:4, dashArray:'6 6'}).addTo(map);
}

loadParks();

// ---------------- Plan trips: the consumer vertical slice ----------------
let PLANS = [], PLANRES = null, PDEF = null;
const PRESETS = {
  relaxed:    {pref_mi:6,  pref_gain:1500, max_mi:9,  max_gain:2500},
  moderate:   {pref_mi:9,  pref_gain:2200, max_mi:13, max_gain:4000},
  challenging:{pref_mi:12, pref_gain:3000, max_mi:16, max_gain:5000},
};

$('plan').onclick = async () => {
  mode = 'plan'; resetAdventure(false);
  $('advctl').style.display = 'none';   // no internal codes in the consumer flow
  if (routeLayer) map.removeLayer(routeLayer);
  if (!PDEF) { try { PDEF = await jget('/api/plan/defaults'); } catch(e){ PDEF = {pref_mi:9,pref_gain:2200,max_mi:13,max_gain:4000,shapes:[]}; } }
  renderPlanForm();
};

function shapeChecked(s){ return (PDEF.shapes||[]).length === 0 || PDEF.shapes.includes(s); }

// The constraint form lives in its own persistent container (#planform),
// deliberately separate from loading/result output (#results): submitting
// a search must never destroy the form it is reading from.
function renderPlanForm(){
  $('planform').style.display = 'block';
  $('results').innerHTML = '';
  $('planform').innerHTML = `
  <div class="pform">
    <h3>Plan a trip</h3>
    <div class="sec"><b>WHERE AND WHEN</b>
      <div class="meta">Destination, dates, nights and party come from the bar above.
      The two dates are your earliest and latest possible start day; exact dates means setting both the same.</div>
    </div>
    <div class="sec"><b>WHAT CAN YOU HANDLE?</b>
      <div>
        <button class="preset" data-p="relaxed">Relaxed</button>
        <button class="preset" data-p="moderate">Moderate</button>
        <button class="preset" data-p="challenging">Challenging</button>
      </div>
      <label>Comfortable day</label>
      <input class="small" id="p_pref_mi" type="number" step="0.5" value="${PDEF.pref_mi}"> miles,
      <input class="small" id="p_pref_gain" type="number" step="100" value="${PDEF.pref_gain}"> ft of climb
      <label>Absolute maximum day</label>
      <input class="small" id="p_max_mi" type="number" step="0.5" value="${PDEF.max_mi}"> miles,
      <input class="small" id="p_max_gain" type="number" step="100" value="${PDEF.max_gain}"> ft of climb
      <label>Hiking pace (for time estimates)</label>
      <select id="p_pace"><option value="1">Typical backpacking pace</option><option value="0.85">A bit slower, heavy packs</option><option value="1.2">Faster, light and fit</option></select>
      <div class="meta">Times use grade-banded speeds (steep miles count for more). Exact per-grade speeds can go in profile.json as a "pace" table.</div>
    </div>
    <div class="sec"><b>WHAT KIND OF TRIP?</b><br>
      <label><input type="checkbox" id="s_loop" ${shapeChecked('loop')?'checked':''}> Loop</label>
      <label><input type="checkbox" id="s_oab" ${shapeChecked('out and back')?'checked':''}> Out and back</label>
      <label><input type="checkbox" id="s_base" ${shapeChecked('basecamp')?'checked':''}> Basecamp (stay put, day hike)</label>
      <label><input type="checkbox" id="p_fcfs" checked> First-come nights are OK</label>
      <label><input type="checkbox" id="p_arrive"> Add a campground near the trailhead the night before</label>
      <label><input type="checkbox" id="p_recover"> Add a recovery campground the night after</label>
    </div>
    <div class="summary" id="p_summary"></div>
    <button class="primary" id="p_go" style="width:100%">Find trips</button>
  </div>`;
  document.querySelectorAll('.preset').forEach(b => b.onclick = () => {
    const p = PRESETS[b.dataset.p];
    $('p_pref_mi').value = p.pref_mi; $('p_pref_gain').value = p.pref_gain;
    $('p_max_mi').value = p.max_mi; $('p_max_gain').value = p.max_gain;
    document.querySelectorAll('.preset').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); planSummary();
  });
  document.querySelectorAll('.pform input').forEach(el => el.oninput = planSummary);
  planSummary();
  $('p_go').onclick = runPlan;
  if (PLANRES) renderPlanCards();   // coming back from a detail view
}

function planShapes(){
  const s = [];
  if ($('s_loop').checked) s.push('loop');
  if ($('s_oab').checked) s.push('out and back');
  if ($('s_base').checked) s.push('basecamp');
  return s;
}

function planSummary(){
  const n = $('nights').value, pt = $('party').value;
  const flex = $('start').value !== $('end').value;
  const when = flex ? `starting between ${$('start').value} and ${$('end').value}` : `starting ${$('start').value}`;
  const sh = planShapes(); const shTxt = sh.length && sh.length < 3 ? sh.join(' or ') : 'any shape';
  $('p_summary').textContent =
    `${n} backcountry night(s) at ${PARK ? PARK.name.split(' National')[0].split(' Wilderness')[0] : '...'}, ` +
    `${when}, party of ${pt}, preferably under ${$('p_pref_mi').value} miles and ${$('p_pref_gain').value} ft per day ` +
    `(never over ${$('p_max_mi').value} mi / ${$('p_max_gain').value} ft), ${shTxt}` +
    ($('p_arrive').checked ? ', arrival campground requested' : '') +
    ($('p_fcfs').checked ? ', first-come stays acceptable' : ', reservable stays only') + '.';
}

async function runPlan(){
  // Read EVERY form value before touching any container. The form
  // survives regardless (it lives in #planform, not #results), but
  // read-first is the rule: the 2026-07-20 audit caught this exact
  // ordering destroying the form mid-read.
  const body = { slug: PARK.slug, start: $('start').value, latest_start: $('end').value,
    nights: +$('nights').value, party: +$('party').value,
    pref_mi: +$('p_pref_mi').value, max_mi: +$('p_max_mi').value,
    pref_gain: +$('p_pref_gain').value, max_gain: +$('p_max_gain').value,
    shapes: planShapes(), first_come_ok: $('p_fcfs').checked,
    arrival_night: $('p_arrive').checked, recovery_night: $('p_recover').checked,
    pace: +$('p_pace').value === 1 ? null : +$('p_pace').value };
  $('results').innerHTML = '<div class="muted">Checking availability and building complete trips...</div>';
  try {
    PLANRES = await jpost('/api/plan', body);
    PLANS = PLANRES.plans;
    renderPlanCards();
  } catch(e){
    let msg = e.message;
    try { const d = JSON.parse(msg); if (d.detail && d.detail.errors) msg = d.detail.errors.join('; '); } catch(_){}
    $('results').innerHTML = `<div class="warn">${msg}</div>`;
  }
}

function fmtWhen(iso){ return iso ? iso.replace('T',' ').replace('+00:00',' UTC') : ''; }
function fmtH(h){ if (h == null) return ''; const m = Math.round(h*60);
  return m < 60 ? m + ' min' : Math.floor(m/60) + ' h' + (m%60 ? ' ' + (m%60) + ' min' : ''); }

function renderPlanCards(){
  const res = PLANRES;
  $('planform').style.display = 'block';   // constraints stay editable above the results
  let html = `<div class="fresh">Availability checked ${fmtWhen(res.checked_at)}</div>`;
  (res.notes||[]).forEach(n => html += `<div class="warn">${n}</div>`);
  if (!PLANS.length){
    html += `<div class="muted">No complete trip fits those limits in that window. The smallest changes that would open trips up:</div>`;
    (res.relaxations||[]).forEach(r => html += `<div class="relax">${r.detail}</div>`);
  }
  PLANS.forEach((p,i) => {
    const seq = [...new Set(p.nights.filter(n=>n.stay_type!=='frontcountry_campground'&&n.stay_type!=='unplanned').map(n=>n.name))].join(' > ');
    const hd = p.totals.hardest_day;
    html += `<div class="card" data-i="${i}">
      ${p.badge ? `<span class="badge top">${p.badge}</span>` : ''}
      <span class="badge ${p.fit.label==='Great fit'?'fit':'stretch'}">${p.fit.label}</span>
      <span class="badge avail">${p.availability_summary}</span>
      <div class="ttl">${p.title}</div>
      <div class="meta">${p.start} to ${p.end} &middot; ${p.nights.length} night(s) &middot; ${p.shape} from ${p.trailhead.name}</div>
      <div class="meta">${p.totals.miles} trail mi${p.totals.hiking_hours ? ` (~${fmtH(p.totals.hiking_hours)} walking)` : ''}${hd ? ` &middot; hardest day ${hd.miles} mi / ${hd.gain_ft.toLocaleString()} ft${hd.est_hours ? ' / ~' + fmtH(hd.est_hours) : ''}` : ''}${p.alternate_starts.length ? ` &middot; ${p.alternate_starts.length} other start date(s)` : ''}</div>
      <div class="meta">${seq}</div>
      <div class="why">${p.fit.reasons[0]||''}</div>
      ${p.fit.tradeoffs.length ? `<div class="trade">Tradeoff: ${p.fit.tradeoffs[0]}</div>` : ''}
    </div>`;
  });
  $('results').innerHTML = html;
  document.querySelectorAll('.card').forEach(el => el.onclick = () => showPlanDetail(+el.dataset.i));
  if (PLANS.length) drawPlan(0);
}

function availLine(n){
  const pol = {reservable:'reservable', first_come:'first-come',
    walk_up:'walk-up', permit_free:'permit-free', unknown:'policy unknown'}[n.policy] || n.policy;
  if (n.policy === 'first_come') return 'first-come: no reservation possible, arrive early';
  if (n.policy === 'permit_free') return 'permit-free: no inventory system, follow dispersed rules';
  if (n.availability === 'available') return `${pol}, ${n.remaining != null ? n.remaining + ' site(s) open' : 'sites open'}, book it`;
  if (n.availability === 'limited') return `${pol}, only ${n.remaining} site(s) left, book soon`;
  if (n.availability === 'full') return `${pol}, full for this night`;
  if (n.availability === 'not_released') return `${pol}, inventory not released yet`;
  return `${pol}, availability unverified, check before relying on it`;
}

function showPlanDetail(i){
  const p = PLANS[i];
  drawPlan(i);
  $('planform').style.display = 'none';   // detail is its own screen; back restores the form
  let html = `<button class="ghost" id="p_back2">All recommendations</button>
    <h3>${p.title}</h3>
    <div><span class="badge ${p.fit.label==='Great fit'?'fit':'stretch'}">${p.fit.label}</span>
    <span class="badge avail">${p.availability_summary}</span></div>
    <div class="meta">${p.start} to ${p.end} &middot; party of ${p.party} &middot; ${p.shape} from ${p.trailhead.name}
    &middot; ${p.totals.miles} mi, ${p.totals.gain_ft.toLocaleString()} ft total</div>
    <div class="fresh">Availability checked ${fmtWhen(p.checked_at)} &middot; confidence: ${p.confidence.replace(/_/g,' ')}</div>`;
  (p.warnings||[]).forEach(w => html += `<div class="warn">${w.message||w}</div>`);
  (p.data_quality||[]).forEach(w => html += `<div class="warn">${w}</div>`);
  html += `<h3 style="margin-top:10px">Where you sleep</h3>`;
  p.nights.forEach(n => {
    const bk = n.booking && n.booking.url ? ` &middot; <a href="${n.booking.url}" target="_blank" rel="noopener">${n.booking.label||'Book'}</a>` : (n.booking && n.booking.label ? ` &middot; ${n.booking.label}` : '');
    html += `<div class="nightrow"><b>${n.date}</b> &middot; ${n.name}
      <div class="meta">${n.stay_type.replace(/_/g,' ')} &middot; ${availLine(n)}${bk}</div>
      ${(n.notes||[]).map(x=>`<div class="meta">${x}</div>`).join('')}</div>`;
  });
  html += `<h3 style="margin-top:10px">Day by day</h3>`;
  p.days.forEach(d => {
    const what = d.kind === 'travel' ? `drive in, camp near ${d.to}` :
      d.kind === 'layover' ? `layover at ${d.to}` :
      `${d.from} to ${d.to}, ${d.miles} mi, +${d.gain_ft.toLocaleString()} ft` +
      (d.est_hours ? `, about ${fmtH(d.est_hours)}` : '') +
      (d.steepest_grade_pct >= 25 ? ` &middot; sustained grades around ${d.steepest_grade_pct}%` : '');
    html += `<div class="nightrow"><b>Day ${d.day}</b> &middot; ${d.date}<div class="meta">${what}</div></div>`;
  });
  if (p.fit.reasons.length) html += `<div class="why"><b>Why it fits:</b> ${p.fit.reasons.join(' ')}</div>`;
  if (p.fit.tradeoffs.length) html += `<div class="trade"><b>Tradeoffs:</b> ${p.fit.tradeoffs.join(' ')}</div>`;
  html += `<div style="margin-top:10px"><button class="primary" id="p_gpx">Download GPX</button></div>`;
  $('results').innerHTML = html;
  $('p_back2').onclick = renderPlanCards;
  $('p_gpx').onclick = async () => {
    const r = await fetch('/api/plan/gpx', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({slug: PARK.slug, entrance: p.gpx.entrance, seq: p.gpx.seq, start: p.gpx.start, title: p.title})});
    if (!r.ok){ alert('GPX export failed: ' + await r.text()); return; }
    const blob = await r.blob(); const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = (p.id||'switchback_trip') + '.gpx'; a.click();
    URL.revokeObjectURL(a.href);
  };
}

function drawPlan(i){
  document.querySelectorAll('.card').forEach((x,k)=>x.classList.toggle('active', k===i));
  const p = PLANS[i];
  if (routeLayer) map.removeLayer(routeLayer);
  const lines = (p.day_paths||[]).filter(x=>x.length>1 && x[0][0]!=null);
  if (!lines.length){ routeLayer = null; return; }
  routeLayer = L.layerGroup(lines.map(x => L.polyline(x, {color:'#2f6f4f', weight:4, opacity:.9}))).addTo(map);
  const all = lines.flat(); if (all.length) map.fitBounds(all, {padding:[40,40]});
}
</script>
<script>
const AREA_INDEX='/api/areas';const AREA_ONE='/api/area/';const AREA_SUFFIX='';const AREA_INFO=(s)=>{document.getElementById('results').innerHTML='<div style="font-size:13px;color:#555">'+s+'</div>';};
</script>
<script>
const areaSel = document.getElementById('area');
let areaLayer = null;
fetch(AREA_INDEX).then(r => r.ok ? r.json() : {areas: []}).then(m => {
  if (!m.areas || !m.areas.length) { areaSel.style.display = 'none'; return; }
  areaSel.innerHTML = '<option value="">explore areas</option>' +
    m.areas.map(a => `<option value="${a.slug}">${a.name} (${Math.round(a.trail_miles)} mi)</option>`).join('');
});
areaSel.onchange = async () => {
  if (areaLayer) { map.removeLayer(areaLayer); areaLayer = null; }
  const slug = areaSel.value;
  if (!slug) return;
  const d = await fetch(AREA_ONE + slug + AREA_SUFFIX).then(r => r.json());
  const b = d.boundary.map(r => L.polyline(r, {color:'#8a5a2b', weight:2, dashArray:'6 5', opacity:.9}));
  const t = d.trails.map(p => L.polyline(p, {color:'#2f6f4f', weight:1.5, opacity:.65}));
  areaLayer = L.layerGroup([...b, ...t]).addTo(map);
  map.fitBounds(L.latLngBounds(d.boundary.flat()));
  AREA_INFO(`${d.name}: ${d.stats.trail_miles} trail mi, ${d.stats.osm_ways + d.stats.gov_added} segments, permit: ${d.permit}`);
};
</script>
<button id="rbp" style="display:none;position:fixed;bottom:18px;right:12px;z-index:1200;padding:10px 14px;border-radius:22px;border:0;background:#2f6f4f;color:#fff;font-size:15px">draw route</button>
<script>
(function(){
const btn=document.getElementById('rbp');let armed=false,P=null,anchor=null,tot=0,com=null,prev=null;
async function loadPark(slug){try{const j=await fetch('/api/park/'+slug).then(r=>r.json());
const nodes={},paths={};(Array.isArray(j.nodes)?j.nodes:Object.entries(j.nodes||{}).map(([k,v])=>({id:k,...v}))).forEach(n=>{if(n.lat!=null)nodes[n.id]= [n.lat,n.lon];});
const edges=[];(j.edges||[]).forEach(e=>{const a=e.a??e[0],b=e.b??e[1],mi=e.mi??e[2];if(a==null)return;edges.push([String(a),String(b),mi]);
const k=[String(a),String(b)].sort().join('|');if(e.path)paths[k]=e.path;});
Object.assign(paths,j.paths||{});if(!Object.keys(nodes).length||!edges.length)return null;
const adj={};edges.forEach(([a,b,mi])=>{(adj[a]=adj[a]||[]).push([b,mi]);(adj[b]=adj[b]||[]).push([a,mi]);});
return{nodes,adj,paths};}catch(_){return null;}}
const sel=document.getElementById('park');
sel&&sel.addEventListener('change',async()=>{P=await loadPark(sel.value);btn.style.display=P?'block':'none';});
function nearN(ll){let bi=null,bd=1e9;for(const[id,c]of Object.entries(P.nodes)){const q=map.latLngToContainerPoint(c),p=map.latLngToContainerPoint(ll),dd=(q.x-p.x)**2+(q.y-p.y)**2;if(dd<bd){bd=dd;bi=id;}}return bd<1600?bi:null;}
function pathFor(a,b){const k=[a,b].sort().join('|');let pts=P.paths[k];if(!pts)return[P.nodes[a],P.nodes[b]];
pts=pts.map(p=>Array.isArray(p)?p:[p.lat,p.lon]);const d0=(pts[0][0]-P.nodes[a][0])**2+(pts[0][1]-P.nodes[a][1])**2;
const d1=(pts[pts.length-1][0]-P.nodes[a][0])**2+(pts[pts.length-1][1]-P.nodes[a][1])**2;return d1<d0?pts.slice().reverse():pts;}
btn.onclick=()=>{armed=!armed;if(!P)return;if(armed){map.dragging.disable();com=com||L.layerGroup().addTo(map);btn.textContent='tap a camp node';}
else{map.dragging.enable();if(prev)map.removeLayer(prev);prev=null;anchor=null;btn.textContent=tot?tot.toFixed(1)+' mi drawn':'draw route';}};
map.on('click',e=>{if(!armed)return;const i=nearN(e.latlng);if(!i)return;
if(anchor==null){anchor=i;btn.textContent='drag toward the next camp';return;}
if(!(P.adj[anchor]||[]).some(([v])=>v==i))return;
com.addLayer(L.polyline(pathFor(anchor,i),{color:'#2fbf5f',weight:4,opacity:.95}));
tot+=(P.adj[anchor].find(([v])=>v==i)[1]||0);anchor=i;if(prev){map.removeLayer(prev);prev=null;}btn.textContent=tot.toFixed(1)+' mi (tap to end)';});
map.on('mousemove',e=>{if(!armed||anchor==null)return;const a=P.nodes[anchor],p=map.latLngToContainerPoint(e.latlng),q=map.latLngToContainerPoint(a);
const brg=Math.atan2(p.x-q.x,q.y-p.y);let best=null,bd=1e9;
for(const[v]of(P.adj[anchor]||[])){const c=map.latLngToContainerPoint(P.nodes[v]);const b2=Math.atan2(c.x-q.x,q.y-c.y);
let d=Math.abs(b2-brg);d=Math.min(d,2*Math.PI-d);if(d<bd){bd=d;best=v;}}
if(best==null||bd>1.1)return;if(prev)map.removeLayer(prev);
prev=L.polyline(pathFor(anchor,best),{color:'#2fbf5f',weight:4,opacity:.9,dashArray:'8 8'}).addTo(map);});
})();
</script>
