<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2f6f4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Switchback board</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --ink:#1e2a23; --pine:#2f6f4f; --sand:#f4f1ea; --line:#d8d2c4; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 system-ui, sans-serif; color:var(--ink); background:var(--sand); }
  header { display:flex; gap:10px; align-items:center; padding:10px 14px; background:#fff; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header b { font-size:16px; }
  header .stamp { color:#7a746a; font-size:12px; margin-left:auto; }
  select { font:inherit; padding:6px 8px; border:1px solid var(--line); border-radius:8px; background:#fff; max-width:60vw; }
  #map { height:44vh; }
  #list { padding:12px; max-width:760px; margin:0 auto; }
  .route { background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px; }
  .route.active { border-color:var(--pine); box-shadow:0 0 0 2px #2f6f4f33; }
  .route .score { float:right; font-weight:700; color:var(--pine); }
  .route .shape { display:inline-block; font-size:11px; background:var(--sand); border-radius:6px; padding:1px 6px; margin-left:4px; }
  .route .days, .route .dates, .route .note { color:#5c564c; font-size:12px; margin-top:3px; }
  .warn { background:#fff6e5; border:1px solid #eedaa8; border-radius:8px; padding:8px 10px; font-size:12px; margin:10px 0; }
  .muted { color:#7a746a; font-size:12px; }
</style>
</head>
<body>
<header>
  <b>Switchback board</b>
  <select id="win"></select>
  <select id="area"></select>
  <span class="stamp" id="stamp"></span>
</header>
<div id="map"></div>
<div id="list"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const $ = id => document.getElementById(id);
const map = L.map('map').setView([47.5,-113.7],6);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 17, attribution: '&copy; OpenStreetMap contributors; trails: OSM (ODbL) + USGS/USFS' }).addTo(map);
let BOARD = null, layer = null, routeLayer = null;

fetch('./board.json').then(r=>r.json()).then(b=>{
  BOARD = b;
  $('stamp').textContent = 'computed ' + b.generated_at.slice(0,16).replace('T',' ') + ' UTC';
  $('win').innerHTML = b.windows.map((w,i)=>`<option value="${i}">${w.title} (${w.start||''} to ${w.end||''})</option>`).join('');
  $('win').onchange = e => show(+e.target.value);
  show(0);
}).catch(()=> $('list').innerHTML = '<div class="warn">board.json not found. The daily Action has not run yet, or Pages is not enabled.</div>');

function show(i){
  const w = BOARD.windows[i];
  if (layer) map.removeLayer(layer);
  if (routeLayer) map.removeLayer(routeLayer);
  if (w.error){ $('list').innerHTML = `<div class="warn">${w.title}: ${w.error}</div>`; return; }
  const pts = [];
  layer = L.layerGroup((w.camps||[]).map(c=>{
    if (c.lat == null) return null;
    pts.push([c.lat, c.lon]);
    const fc = c.policy !== 'reservation';
    const days = (new Date(w.end) - new Date(w.start))/86400000 + 1;
    const col = fc ? '#4a6fa5' : c.open_nights === 0 ? '#b8433a' : (c.open_nights/days > .6 ? '#2f6f4f' : '#e0a13d');
    return L.circleMarker([c.lat,c.lon],{radius:6,color:'#555',weight:1,fillColor:col,fillOpacity:.9})
      .bindTooltip(`${c.name}: ${fc ? 'first-come, no reservation system' : c.open_nights + ' open night(s)'}`);
  }).filter(Boolean)).addTo(map);
  if (pts.length) map.fitBounds(pts,{padding:[30,30]});
  let html = `<div class="muted">${w.itineraries} bookable itineraries, ${w.routes_total} distinct routes, ${w.nights} nights, party ${w.party}.</div>`;
  if (w.trip_type !== 'any') html += `<div class="warn">FILTER ACTIVE: only ${w.trip_type} trips shown.</div>`;
  (w.routes||[]).forEach((r,j)=>{
    const fc = r.stops.some(s=>s.policy !== 'reservation');
    html += `<div class="route" data-j="${j}"><span class="score">${r.score.toFixed(3)}</span>
      <b>${r.entrance.split(' - ')[0]}</b> <span class="shape">${r.type}</span>
      <div>${r.stops.map(s=>s.name.split(' - ')[0] + (s.policy!=='reservation'?'*':'')).join(' > ')}</div>
      <div class="days">${r.days.map(d=>d[0].toFixed(1)+'mi').join(' ')}</div>
      <div class="dates">${r.dates.length} start date(s): ${r.dates[0]}${r.dates.length>1?' to '+r.dates[r.dates.length-1]:''}</div>
      ${(r.notes||[]).map(n=>`<div class="note">${n}</div>`).join('')}
      ${fc ? '<div class="note">* first-come site: no reservation system, arrive early</div>' : ''}</div>`;
  });
  $('list').innerHTML = html || '<div class="muted">No routes.</div>';
  document.querySelectorAll('.route').forEach(el => el.onclick = () => draw(w, +el.dataset.j, el));
  if ((w.routes||[]).length) draw(w, 0, document.querySelector('.route'));
}

function draw(w, j, el){
  document.querySelectorAll('.route').forEach(x=>x.classList.remove('active'));
  if (el) el.classList.add('active');
  if (routeLayer) map.removeLayer(routeLayer);
  const lines = w.routes[j].day_paths.filter(p=>p.length>1 && p[0][0]!=null);
  routeLayer = L.layerGroup(lines.map(p=>L.polyline(p,{color:'#2f6f4f',weight:4,opacity:.9}))).addTo(map);
  const all = lines.flat(); if (all.length) map.fitBounds(all,{padding:[40,40]});
}
</script>
<script>
const AREA_INDEX='../areas/index.json';const AREA_ONE='../areas/';const AREA_SUFFIX='.json';const AREA_INFO=(s)=>{document.getElementById('stamp').textContent=s;};
</script>
<script>
const areaSel = document.getElementById('area');
let areaLayer = null;
fetch(AREA_INDEX).then(r => r.ok ? r.json() : {areas: []}).then(m => {
  if (!m.areas || !m.areas.length) { areaSel.style.display = 'none'; return; }
  areaSel.innerHTML = '<option value="">explore areas</option>' +
    m.areas.map(a => `<option value="${a.slug}">${a.name} (${Math.round(a.trail_miles)} mi)</option>`).join('');
});
function clipPip(p, rings){let c=0;for(const r of rings){for(let i=0,j=r.length-1;i<r.length;j=i++){const a=r[i],b=r[j];
if(((a[0]>p[0])!=(b[0]>p[0]))&&(p[1]<(b[1]-a[1])*(p[0]-a[0])/(b[0]-a[0])+a[1]))c++;}}return c%2==1;}
function renderArea(){
  const d = window.__rawArea; if (!d) return;
  if (areaLayer) { map.removeLayer(areaLayer); areaLayer = null; }
  const clip = document.getElementById('clip').checked;
  const b = d.boundary.map(r => L.polyline(r, {color:'#8a5a2b', weight:2, dashArray:'6 5', opacity:.9}));
  let lines = d.edges ? d.edges.map(e => e[3]) : (d.trails || []);
  if (clip && d.boundary) lines = lines.filter(p => p.length > 1 && clipPip(p[Math.floor(p.length/2)], d.boundary));
  const t = lines.map(p => L.polyline(p, {color:'#2f6f4f', weight:1.5, opacity:.65}));
  areaLayer = L.layerGroup([...b, ...t]).addTo(map);
}
document.getElementById('clip').onchange = renderArea;
areaSel.onchange = async () => {
  if (areaLayer) { map.removeLayer(areaLayer); areaLayer = null; }
  const slug = areaSel.value;
  if (!slug) { window.__rawArea = null; return; }
  const d = await fetch(AREA_ONE + slug + AREA_SUFFIX).then(r => r.json());
  window.__rawArea = d;
  renderArea();
  window.__area = d.edges ? d : null;
  document.getElementById('rb').style.display = d.edges ? 'block' : 'none';
  map.fitBounds(L.latLngBounds(d.boundary.flat()));
  AREA_INFO(`${d.name}: ${d.stats.trail_miles} trail mi, ${d.stats.osm_ways + d.stats.gov_added} segments, permit: ${d.permit}`);
};
</script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
<label style="position:fixed;bottom:64px;right:12px;z-index:1200;background:#fff;padding:6px 10px;border-radius:14px;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.25)"><input type="checkbox" id="clip"> clip to boundary</label>
<button id="gpx" style="display:none;position:fixed;bottom:18px;right:150px;z-index:1200;padding:10px 14px;border-radius:22px;border:0;background:#8a5a2b;color:#fff;font-size:15px">GPX</button>
<button id="rb" style="display:none;position:fixed;bottom:18px;right:12px;z-index:1200;padding:10px 14px;border-radius:22px;border:0;background:#2f6f4f;color:#fff;font-size:15px">draw route</button>
<script>
(function(){
const btn=document.getElementById('rb');let armed=false,adj=null,inB=null,anchor=null,tot=0;
let prev=[],com=L.layerGroup(),lay=null,mk=null,last=0;
function pip(p,rings){let c=0;for(const r of rings){for(let i=0,j=r.length-1;i<r.length;j=i++){const a=r[i],b=r[j];
if(((a[0]>p[0])!=(b[0]>p[0]))&&(p[1]<(b[1]-a[1])*(p[0]-a[0])/(b[0]-a[0])+a[1]))c++;}}return c%2==1;}
function prep(d){adj={};d.edges.forEach((e,i)=>{(adj[e[0]]=adj[e[0]]||[]).push([e[1],e[2],i]);(adj[e[1]]=adj[e[1]]||[]).push([e[0],e[2],i]);});
inB=d.nodes.map(n=>pip(n,d.boundary));}
function near(ll){const d=window.__area;let bi=-1,bd=1e9;d.nodes.forEach((n,i)=>{const q=map.latLngToContainerPoint(n),p=map.latLngToContainerPoint(ll),dd=(q.x-p.x)**2+(q.y-p.y)**2;if(dd<bd){bd=dd;bi=i;}});return bd<1600?bi:-1;}
function route(s,t){const d=window.__area,dist={},pr={},pq=[[0,s]];dist[s]=0;
while(pq.length){pq.sort((a,b)=>a[0]-b[0]);const[dd,u]=pq.shift();if(u==t)break;if(dd>dist[u])continue;
for(const[v,w,ei]of(adj[u]||[])){const nd=dd+w;if(nd<(dist[v]??1e9)){dist[v]=nd;pr[v]=[u,ei];pq.push([nd,v]);}}}
if(dist[t]==null)return null;const segs=[];let u=t;while(u!=s){const[p,ei]=pr[u];segs.push(ei);u=p;}return{mi:dist[t],segs};}
function draw(r){if(lay){map.removeLayer(lay);}const d=window.__area,g=[];
r.segs.forEach(ei=>{const e=d.edges[ei];const ok=inB[e[0]]&&inB[e[1]];
g.push(L.polyline(e[3],{color:ok?'#2fbf5f':'#d9a029',weight:4,opacity:.9,dashArray:'8 8'}));});
lay=L.layerGroup(g).addTo(map);btn.textContent=(tot+r.mi).toFixed(1)+' mi (tap to end)';}
btn.onclick=()=>{armed=!armed;const d=window.__area;if(!d)return;
if(armed){if(!adj)prep(d);map.dragging.disable();com.addTo(map);btn.textContent='tap a trail node';}
else{map.dragging.enable();if(lay)map.removeLayer(lay);lay=null;anchor=null;if(mk)map.removeLayer(mk);btn.textContent=tot?tot.toFixed(1)+' mi drawn':'draw route';}};
map.on('click',e=>{if(!armed)return;const i=near(e.latlng);if(i<0)return;const d=window.__area;
if(anchor==null){anchor=i;mk=L.circleMarker(d.nodes[i],{radius:7,color:'#2fbf5f'}).addTo(map);btn.textContent='drag or tap the next node';return;}
const r=route(anchor,i);if(!r){btn.textContent='no trail connects those';return;}
let u=anchor;const chain=[];
r.segs.slice().reverse().forEach(ei=>{const ed=d.edges[ei];
const fwd=(ed[0]==u);const pts=fwd?ed[3]:ed[3].slice().reverse();
chain.push(...(chain.length?pts.slice(1):pts));u=fwd?ed[1]:ed[0];});
window.__gpx=(window.__gpx||[]);window.__gpx.push(chain);
document.getElementById('gpx').style.display='block';
r.segs.forEach(ei=>{const ed=d.edges[ei];const ok=inB[ed[0]]&&inB[ed[1]];
com.addLayer(L.polyline(ed[3],{color:ok?'#2fbf5f':'#d9a029',weight:4,opacity:.95}));});
tot+=r.mi;anchor=i;mk.setLatLng(d.nodes[i]);if(lay){map.removeLayer(lay);lay=null;}btn.textContent=tot.toFixed(1)+' mi (tap to end)';});
map.on('mousemove',e=>{if(!armed||anchor==null)return;const now=Date.now();if(now-last<90)return;last=now;
const i=near(e.latlng);if(i<0||i==anchor)return;const r=route(anchor,i);if(r)draw(r);});
document.getElementById('gpx').onclick=()=>{const segs=window.__gpx||[];if(!segs.length)return;
const trksegs=segs.map(c=>'<trkseg>'+c.map(p=>`<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`).join('')+'</trkseg>').join('');
const doc=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="switchback" xmlns="http://www.topografix.com/GPX/1/1"><trk><name>switchback drawn route</name>${trksegs}</trk></gpx>`;
const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([doc],{type:'application/gpx+xml'}));
a.download='switchback-route-'+new Date().toISOString().slice(0,10)+'.gpx';a.click();};
})();
</script>
<div style="position:fixed;left:8px;bottom:6px;font-size:10px;color:#8a5a2b;opacity:.8;z-index:1300">switchback v3.6.2</div>
</body>
</html>
